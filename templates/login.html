<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UDDAAN · ENTER THE REALM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#e8850a;          /* warm amber */
  --violet:#4f46e5;        /* indigo */
  --rose:#f43f5e;          /* coral rose */
  --bg:#fdf8f0;            /* warm ivory */
  --surface:rgba(255,252,245,0.82);
  --glow-v:rgba(79,70,229,0.18);
  --glow-g:rgba(232,133,10,0.22);
  --txt:#1e1b2e;           /* near-black indigo */
  --dim:#9b93b0;           /* muted lavender grey */
}
html{font-size:16px}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Cinzel',serif;
  min-height:100dvh;
  height:100dvh;
  overflow:hidden;
  position:relative;
  cursor:none;
}

/* ══ CURSOR ══════════════════════════════ */
#cursor{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--violet);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--violet),0 0 20px rgba(79,70,229,0.4);transition:background 0.3s,box-shadow 0.3s}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--violet);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);opacity:0.35;transition:width 0.3s,height 0.3s,border-color 0.3s,opacity 0.3s}

/* ══ CANVAS ══════════════════════════════ */
#bgCanvas{position:fixed;inset:0;z-index:0}
#ptCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ══ OVERLAYS ════════════════════════════ */
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.012) 3px,rgba(0,0,0,0.012) 4px)}
.grain{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px 180px}
.vignette{position:fixed;inset:0;z-index:4;pointer-events:none;background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 35%,rgba(240,232,220,0.6) 100%)}
#flash{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0}
#flash.pop{animation:flashBurst 0.75s forwards}
@keyframes flashBurst{0%{opacity:0}12%{opacity:0.25}100%{opacity:0}}

/* ══ INTRO SCREEN ════════════════════════ */
#intro{
  position:fixed;inset:0;z-index:9000;
  background:#fdf8f0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
}
.intro-letters{display:flex;align-items:center;justify-content:center;gap:4px}
.il{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(60px,10vw,120px);
  font-weight:700;
  background:linear-gradient(135deg,var(--violet) 0%,var(--gold) 50%,var(--rose) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  opacity:0;
  transform:translateY(80px) scale(0.4) rotate(20deg);
  animation:letterRise 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
  filter:drop-shadow(0 4px 16px rgba(79,70,229,0.25));
}
.il:nth-child(1){animation-delay:0.1s}.il:nth-child(2){animation-delay:0.22s}
.il:nth-child(3){animation-delay:0.34s}.il:nth-child(4){animation-delay:0.46s}
.il:nth-child(5){animation-delay:0.58s}.il:nth-child(6){animation-delay:0.70s}
@keyframes letterRise{to{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}}

.intro-tagline{
  font-family:'Space Mono',monospace;
  font-size:0.7rem;letter-spacing:6px;
  color:var(--dim);text-transform:uppercase;
  opacity:0;animation:fadeSlideUp 0.7s 1.1s forwards;
}
.intro-bar{
  width:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--violet),var(--gold),var(--rose),transparent);
  box-shadow:0 0 10px rgba(79,70,229,0.3);
  animation:barGrow 0.8s 1.3s cubic-bezier(0.22,1,0.36,1) forwards;
  border-radius:2px;
}
@keyframes fadeSlideUp{to{opacity:0.6;transform:translateY(0)}}
@keyframes barGrow{to{width:260px}}
#intro.exit{animation:introExit 0.8s forwards}
@keyframes introExit{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.06)}}

/* ══ MAIN STAGE ══════════════════════════ */
#stage{position:relative;z-index:10;width:100%;height:100dvh;display:flex;align-items:center;justify-content:center;opacity:0;}
#stage.visible{animation:stageFadeIn 1s 0.2s forwards}
@keyframes stageFadeIn{to{opacity:1}}

/* ══ DUAL PANEL LAYOUT ═══════════════════ */
.auth-wrap{
  position:relative;
  width:min(960px,96vw);
  height:min(560px,90vh);
  display:flex;align-items:stretch;
  filter:drop-shadow(0 24px 64px rgba(79,70,229,0.12)) drop-shadow(0 4px 16px rgba(0,0,0,0.08));
}

/* SLIDING PANEL */
.slide-panel{
  position:absolute;top:0;bottom:0;width:45%;
  background:linear-gradient(135deg,#4f46e5 0%,#7c73f0 45%,#a78bfa 100%);
  z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 36px;overflow:hidden;
  transition:left 0.75s cubic-bezier(0.77,0,0.175,1), border-radius 0.75s cubic-bezier(0.77,0,0.175,1);
  left:0;border-radius:24px 0 0 24px;
  box-shadow:6px 0 40px rgba(79,70,229,0.2);
}
.slide-panel::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 65% 35%,rgba(255,255,255,0.18) 0%,transparent 60%);
  pointer-events:none;
}
.slide-panel::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.025) 20px,rgba(255,255,255,0.025) 21px);
  pointer-events:none;
}
#panelCanvas{position:absolute;inset:0;z-index:0;pointer-events:none}

.panel-content{position:relative;z-index:5;text-align:center}
.panel-eyebrow{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:5px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:14px;}
.panel-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;color:#fff;line-height:1.15;margin-bottom:16px;text-shadow:0 2px 20px rgba(79,70,229,0.4);}
.panel-title em{display:block;background:linear-gradient(90deg,#fde68a,#fff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;}
.panel-sub{font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:2px;color:rgba(255,255,255,0.55);line-height:1.8;margin-bottom:32px;}
.panel-btn{
  padding:12px 32px;
  font-family:'Cinzel',serif;font-size:0.75rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;
  border:1.5px solid rgba(255,255,255,0.55);
  background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;
  position:relative;overflow:hidden;transition:all 0.4s;border-radius:2px;
  backdrop-filter:blur(8px);
}
.panel-btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.12);transform:translateX(-100%);transition:transform 0.4s;}
.panel-btn:hover::before{transform:translateX(0)}
.panel-btn:hover{border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,0.25);background:rgba(255,255,255,0.18);}

/* FORM SIDE */
.form-side{
  position:absolute;top:0;bottom:0;right:0;width:55%;
  background:rgba(255,253,248,0.92);
  backdrop-filter:blur(40px) saturate(140%);
  border:1px solid rgba(79,70,229,0.1);
  border-left:none;border-radius:0 24px 24px 0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 44px;overflow:hidden;
  transition:border-radius 0.75s cubic-bezier(0.77,0,0.175,1);
}
.form-side::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(79,70,229,0.03) 0%,rgba(232,133,10,0.02) 100%);
  pointer-events:none;
}
.form-side::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--violet),var(--gold),transparent);
  opacity:0.5;border-radius:0 24px 0 0;
}

/* corner brackets — amber */
.fc{position:absolute;width:16px;height:16px;border-color:var(--gold);border-style:solid;opacity:0.55}
.fc.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.fc.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.fc.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.fc.br{bottom:10px;right:10px;border-width:0 2px 2px 0}

/* FORMS */
.form-panel{width:100%;position:absolute;transition:transform 0.6s cubic-bezier(0.77,0,0.175,1), opacity 0.5s ease;}
.form-panel.login-f{transform:translateX(0);opacity:1}
.form-panel.signup-f{transform:translateX(60px);opacity:0;pointer-events:none}
.is-signup .form-panel.login-f{transform:translateX(-60px);opacity:0;pointer-events:none}
.is-signup .form-panel.signup-f{transform:translateX(0);opacity:1;pointer-events:auto}

.form-eyebrow{font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:5px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;}
.form-title{
  font-family:'Cinzel Decorative',serif;font-size:1.55rem;font-weight:700;margin-bottom:24px;
  background:linear-gradient(135deg,var(--violet),var(--gold));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 8px rgba(79,70,229,0.15));
}

/* INPUT GROUP */
.inp-group{position:relative;margin-bottom:14px;width:100%}
.inp-group label{display:block;font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
.inp-group input{
  width:100%;padding:13px 16px 13px 42px;
  background:rgba(79,70,229,0.04);
  border:1px solid rgba(79,70,229,0.12);
  border-bottom:1.5px solid rgba(79,70,229,0.35);
  color:var(--txt);outline:none;
  font-family:'Space Mono',monospace;font-size:0.8rem;
  transition:all 0.35s;border-radius:2px;
}
.inp-group input::placeholder{color:var(--dim);font-size:0.75rem}
.inp-group input:focus{
  border-color:var(--violet);
  background:rgba(79,70,229,0.06);
  box-shadow:0 0 0 2px rgba(79,70,229,0.1), 0 4px 20px rgba(79,70,229,0.08);
}
.inp-icon{position:absolute;bottom:14px;left:14px;color:var(--dim);font-size:0.85rem;transition:color 0.35s;pointer-events:none;}
.inp-group:focus-within .inp-icon{color:var(--violet)}

/* SUBMIT BTN */
.submit-btn{
  width:100%;padding:14px;
  font-family:'Cinzel',serif;font-size:0.88rem;font-weight:600;
  letter-spacing:6px;text-transform:uppercase;border:none;
  background:linear-gradient(135deg,#4f46e5 0%,#7c73f0 40%,#e8850a 100%);
  background-size:200% 100%;
  color:#fff;cursor:pointer;
  position:relative;overflow:hidden;
  transition:all 0.5s cubic-bezier(0.22,1,0.36,1);
  margin-top:18px;margin-bottom:12px;border-radius:4px;
  box-shadow:0 4px 20px rgba(79,70,229,0.25);
}
.submit-btn::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transition:left 0.6s;}
.submit-btn:hover::before{left:140%}
.submit-btn:hover{background-position:100% 0;transform:translateY(-3px);box-shadow:0 12px 36px rgba(79,70,229,0.35),0 4px 12px rgba(232,133,10,0.2);}
.submit-btn:active{transform:translateY(-1px)}

/* divider */
.or-row{display:flex;align-items:center;gap:12px;margin:4px 0 10px;}
.or-line{flex:1;height:1px;background:rgba(79,70,229,0.1)}
.or-txt{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;color:var(--dim)}

/* social btns */
.social-row{display:flex;gap:10px;margin-bottom:14px}
.social-btn{
  flex:1;padding:10px;
  background:rgba(79,70,229,0.04);
  border:1px solid rgba(79,70,229,0.12);
  color:var(--dim);cursor:pointer;
  font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;
  transition:all 0.3s;border-radius:2px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.social-btn:hover{border-color:var(--violet);color:var(--violet);background:rgba(79,70,229,0.06);box-shadow:0 2px 12px rgba(79,70,229,0.1);}

/* switch link */
.switch-lnk{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;cursor:pointer;text-align:center;transition:color 0.3s;}
.switch-lnk span{color:var(--violet)}
.switch-lnk:hover{color:var(--violet)}

/* forgot */
.forgot{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:2px;color:var(--dim);text-align:right;cursor:pointer;margin-top:-8px;margin-bottom:4px;transition:color 0.3s;display:block;}
.forgot:hover{color:var(--gold)}

/* ══ SIGNUP STATE — coral/rose sliding panel ═════════════ */
.is-signup .slide-panel{
  left:55%;border-radius:0 24px 24px 0;
  background:linear-gradient(135deg,#be185d 0%,#f43f5e 50%,#fb923c 100%);
  box-shadow:-6px 0 40px rgba(244,63,94,0.2);
}
.is-signup .form-side{
  left:0;right:auto;
  border-radius:24px 0 0 24px;
  border-left:1px solid rgba(244,63,94,0.1);border-right:none;
}
.is-signup .form-side::after{
  border-radius:24px 0 0 0;
  background:linear-gradient(90deg,transparent,var(--rose),var(--gold),transparent);
}

/* ══ MOUSE TRAIL ════════════════════════ */
.trail{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:99990;transform:translate(-50%,-50%);filter:blur(2px);}

/* ══ TICKER ══════════════════════════════ */
.ticker-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(253,248,240,0.95);
  border-top:1px solid rgba(79,70,229,0.1);
  padding:8px 0;overflow:hidden;
  backdrop-filter:blur(12px);
}
.ticker-inner{display:flex;gap:56px;white-space:nowrap;animation:tickS 40s linear infinite;}
@keyframes tickS{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-it{font-family:'Space Mono',monospace;font-size:0.54rem;letter-spacing:3px;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.tick-it span{color:var(--violet);text-shadow:none;font-weight:700}

/* ══ RESPONSIVE ══════════════════════════ */
@media(max-width:700px){
  .auth-wrap{width:95vw;height:auto}
  .slide-panel{display:none}
  .form-side{position:relative;width:100%;border-radius:20px;border:1px solid rgba(79,70,229,0.1);padding:36px 28px;left:0!important;right:0!important}
  .is-signup .form-side{border-radius:20px}
}

.flash-msg{margin-bottom:14px;padding:10px 14px;border-radius:6px;font-size:14px;font-weight:500;font-family:'Space Mono',monospace;font-size:0.7rem;}
.flash-msg.success{background:rgba(79,70,229,0.08);border:1px solid rgba(79,70,229,0.25);color:#4f46e5;}
.flash-msg.danger{background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.25);color:#f43f5e;}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="ptCanvas"></canvas>
<div class="scan"></div>
<div class="grain"></div>
<div class="vignette"></div>
<div id="flash"></div>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- ══ INTRO ══════════════════════════════ -->
<div id="intro">
  <div class="intro-letters">
    <span class="il">U</span><span class="il">D</span><span class="il">D</span>
    <span class="il">A</span><span class="il">A</span><span class="il">N</span>
  </div>
  <div class="intro-tagline">Enter The Realm · AI Evolution Begins</div>
  <div class="intro-bar"></div>
</div>

<!-- ══ STAGE ══════════════════════════════ -->
<div id="stage">
  <div class="auth-wrap" id="authWrap">

    <div class="slide-panel">
      <canvas id="panelCanvas"></canvas>
      <div class="panel-content" id="panelContent"></div>
    </div>

    <div class="form-side" id="formSide">
      <div class="fc tl"></div><div class="fc tr"></div>
      <div class="fc bl"></div><div class="fc br"></div>

      <!-- LOGIN -->
      <div class="form-panel login-f" id="loginPanel">
        <div class="form-eyebrow">Secure Access · Neural Auth</div>
        <div class="form-title">Welcome Back</div>
        <form action="/login" method="POST">
          <div class="inp-group">
            <label>Email Address</label>
            <span class="inp-icon">✉</span>
            <input type="email" name="email" placeholder="your@email.com" required/>
          </div>
          <div class="inp-group">
            <label>Password</label>
            <span class="inp-icon">⬡</span>
            <input type="password" name="password" placeholder="••••••••••••" required/>
          </div>
          <span class="forgot">Forgot password?</span>
          <button type="submit" class="submit-btn">Login</button>
        </form>
        <div class="or-row"><div class="or-line"></div><div class="or-txt">or continue with</div><div class="or-line"></div></div>
        <div class="social-row">
          <button type="button" class="social-btn">◈ Google</button>
          <button type="button" class="social-btn">⬡ GitHub</button>
        </div>
        <div class="switch-lnk" onclick="switchTo('signup')">No account? <span>Create One →</span></div>
        <div class="switch-lnk"><a href="/about" style="text-decoration:none;color:inherit;">About Us →</a></div>
      </div>

      <!-- SIGNUP -->
      <div class="form-panel signup-f" id="signupPanel">
        <div class="form-eyebrow">Join The Future · Neural ID</div>
        <div class="form-title">Create Account</div>
        <form action="/register" method="POST">
          <div class="inp-group">
            <label>Full Name</label>
            <span class="inp-icon">◈</span>
            <input type="text" name="username" placeholder="Your Name" autocomplete="name" required/>
          </div>
          <div class="inp-group">
            <label>Email Address</label>
            <span class="inp-icon">✉</span>
            <input type="email" name="email" placeholder="your@email.com" autocomplete="email" required/>
          </div>
          <div class="inp-group">
            <label>Password</label>
            <span class="inp-icon">⬡</span>
            <input type="password" name="password" placeholder="Create a strong password" autocomplete="new-password" required/>
          </div>
          <button type="submit" class="submit-btn">Create Account</button>
        </form>
        <div class="or-row"><div class="or-line"></div><div class="or-txt">or sign up with</div><div class="or-line"></div></div>
        <div class="social-row">
          <button type="button" class="social-btn">◈ Google</button>
          <button type="button" class="social-btn">⬡ GitHub</button>
        </div>
        <div class="switch-lnk" onclick="switchTo('login')">← <span>Back to Login</span></div>
      </div>

    </div>
  </div>
</div>

<div class="ticker-wrap"><div class="ticker-inner" id="ticker"></div></div>

<script>
window.addEventListener("load",function(){switchTo("login",true)});

/* ══ CANVAS ══════════════════════════════ */
const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');
const ptC=document.getElementById('ptCanvas'),ptX=ptC.getContext('2d');
let W,H;
function resize(){W=bgC.width=ptC.width=innerWidth;H=bgC.height=ptC.height=innerHeight}
resize();window.addEventListener('resize',resize);

const pc=document.getElementById('panelCanvas');
const px=pc.getContext('2d');
function resizePanel(){const r=pc.parentElement.getBoundingClientRect();pc.width=r.width;pc.height=r.height;}

const lerp=(a,b,t)=>a+(b-a)*t;
const lerpC=(a,b,t)=>a.map((v,i)=>lerp(v,b[i],t));
const rgb=(c,a=1)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
const ease=(t)=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

/* ══ LIGHT THEME — soft pastels on ivory ═══════════════ */
const STATES={
  login:{
    c:[[79,70,229],[232,133,10],[167,139,250]],  /* indigo, amber, lavender */
    bg:[253,248,240]   /* warm ivory */
  },
  signup:{
    c:[[244,63,94],[251,146,60],[190,24,93]],    /* rose, orange, deep rose */
    bg:[255,250,248]   /* warm blush white */
  },
};
let curC=STATES.login.c.map(c=>[...c]);
let curBg=[...STATES.login.bg];
let fromC=curC.map(c=>[...c]);
let fromBg=[...curBg];
let targetC=STATES.login.c.map(c=>[...c]);
let targetBg=[...STATES.login.bg];
let lerpT=1;

function setTheme(state){
  fromC=curC.map(c=>[...c]);fromBg=[...curBg];
  targetC=STATES[state].c.map(c=>[...c]);targetBg=[...STATES[state].bg];
  lerpT=0;
}
function tickLerp(){
  if(lerpT>=1)return;
  lerpT=Math.min(1,lerpT+0.028);
  const t=ease(lerpT);
  curC=fromC.map((fc,i)=>lerpC(fc,targetC[i],t));
  curBg=lerpC(fromBg,targetBg,t);
}

/* ══ BG DRAW — soft light orbs ════════════════════════ */
const ORBS=[
  {xf:0.12,yf:0.25,spd:0.00016,sz:0.55,ci:0},
  {xf:0.88,yf:0.75,spd:0.00012,sz:0.50,ci:1},
  {xf:0.50,yf:0.55,spd:0.00009,sz:0.42,ci:2},
  {xf:0.18,yf:0.82,spd:0.00014,sz:0.32,ci:1},
  {xf:0.82,yf:0.18,spd:0.00011,sz:0.36,ci:0},
];
function drawBg(ts){
  bgX.clearRect(0,0,W,H);
  bgX.fillStyle=`rgb(${curBg[0]|0},${curBg[1]|0},${curBg[2]|0})`;
  bgX.fillRect(0,0,W,H);
  ORBS.forEach((o,i)=>{
    const ox=(o.xf+0.30*Math.sin(ts*o.spd+i*1.5))*W;
    const oy=(o.yf+0.25*Math.cos(ts*o.spd*0.7+i*2.2))*H;
    const r=Math.min(W,H)*o.sz;
    const col=curC[o.ci];
    const g=bgX.createRadialGradient(ox,oy,0,ox,oy,r);
    g.addColorStop(0,rgb(col,0.09));
    g.addColorStop(0.5,rgb(col,0.04));
    g.addColorStop(1,rgb(col,0));
    bgX.fillStyle=g;bgX.beginPath();bgX.arc(ox,oy,r,0,Math.PI*2);bgX.fill();
  });
}

/* ══ PANEL GEOMETRY ═══════════════════════════════════ */
let panAngle=0;
function drawPanel(ts){
  if(!pc.width)return;
  px.clearRect(0,0,pc.width,pc.height);
  const cx=pc.width/2,cy=pc.height/2;
  panAngle+=0.005;
  [[0.38,0.12],[0.55,0.07],[0.70,0.04]].forEach(([r,op])=>{
    const rad=Math.min(pc.width,pc.height)*r;
    px.beginPath();px.arc(cx,cy,rad,0,Math.PI*2);
    px.strokeStyle=`rgba(255,255,255,${op+0.06})`;
    px.lineWidth=1;px.stroke();
  });
  const tr=Math.min(pc.width,pc.height)*0.3;
  px.save();px.translate(cx,cy);px.rotate(panAngle);
  px.beginPath();
  for(let i=0;i<3;i++){const a=(Math.PI*2/3)*i-Math.PI/2;i===0?px.moveTo(Math.cos(a)*tr,Math.sin(a)*tr):px.lineTo(Math.cos(a)*tr,Math.sin(a)*tr);}
  px.closePath();px.strokeStyle='rgba(255,255,255,0.28)';px.lineWidth=1.2;px.stroke();
  px.restore();
  px.save();px.translate(cx,cy);px.rotate(-panAngle*0.7);
  px.beginPath();
  for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i;const r2=Math.min(pc.width,pc.height)*0.22;i===0?px.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):px.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}
  px.closePath();px.strokeStyle='rgba(255,255,255,0.18)';px.lineWidth=1;px.stroke();
  px.restore();
  const cg=px.createRadialGradient(cx,cy,0,cx,cy,55);
  cg.addColorStop(0,'rgba(255,255,255,0.35)');cg.addColorStop(1,'rgba(255,255,255,0)');
  px.fillStyle=cg;px.beginPath();px.arc(cx,cy,55,0,Math.PI*2);px.fill();
  for(let i=0;i<8;i++){
    const a=panAngle+i*(Math.PI*2/8);
    const dr=Math.min(pc.width,pc.height)*0.38;
    const dx=cx+Math.cos(a)*dr,dy=cy+Math.sin(a)*dr;
    px.beginPath();px.arc(dx,dy,2.5,0,Math.PI*2);
    px.fillStyle='rgba(255,255,255,0.6)';px.fill();
  }
}

/* ══ PARTICLES — lighter opacity for light bg ═══════════ */
const PCOUNT=70;
const parts=Array.from({length:PCOUNT},()=>spawnP(true));
const bursts=[];
function spawnP(rand=false){
  return{x:Math.random()*innerWidth,y:rand?Math.random()*innerHeight:innerHeight+8,
    vx:(Math.random()-0.5)*0.5,vy:-(Math.random()*1.2+0.15),
    sz:Math.random()<0.25?2:Math.random()<0.6?1.2:0.8,
    life:Math.random(),maxL:Math.random()*0.5+0.45,
    tw:Math.random()*Math.PI*2,ci:Math.floor(Math.random()*3)};
}
function addBurst(x,y,n=55){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i)/n+Math.random()*0.5;
    const s=Math.random()*8+1;
    bursts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,sz:Math.random()*2.5+0.8,ci:i%3});
  }
}
function drawParticles(){
  ptX.clearRect(0,0,ptC.width,ptC.height);
  parts.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.life+=0.004;p.tw+=0.05;
    const prog=p.life/p.maxL;
    let op=prog<0.2?prog/0.2:prog>0.75?(1-prog)/0.25:1;
    op*=0.5+0.3*Math.sin(p.tw);
    if(p.life>=p.maxL||p.y<-20){parts[i]=spawnP(false);return;}
    const col=curC[p.ci];
    ptX.beginPath();ptX.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ptX.fillStyle=rgb(col,op*0.45);
    ptX.shadowBlur=p.sz*5;ptX.shadowColor=rgb(col,0.25);
    ptX.fill();ptX.shadowBlur=0;
  });
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    b.x+=b.vx;b.y+=b.vy;b.vy+=0.18;b.life-=0.028;
    if(b.life<=0){bursts.splice(i,1);continue;}
    const col=curC[b.ci];
    ptX.beginPath();ptX.arc(b.x,b.y,b.sz*b.life,0,Math.PI*2);
    ptX.fillStyle=rgb(col,b.life*0.65);
    ptX.shadowBlur=8;ptX.shadowColor=rgb(col,b.life*0.5);
    ptX.fill();ptX.shadowBlur=0;
  }
}

function loop(ts){tickLerp();drawBg(ts);drawPanel(ts);drawParticles();requestAnimationFrame(loop);}
requestAnimationFrame(loop);

/* ══ PANEL CONTENT ════════════════════════════════════ */
const PANEL_CONTENT={
  login:{eye:'Welcome Back · Initiate',title:'ENTER THE <em>REALM</em>',sub:'Login to access your AI dashboard\nand unleash your neural powers.',btnTxt:'Create Account →',action:'signup'},
  signup:{eye:'Join The Future · Neural ID',title:'BEGIN YOUR <em>JOURNEY</em>',sub:'Create your account and unlock\nthe full power of AI intelligence.',btnTxt:'← Back to Login',action:'login'},
};
function updatePanel(state){
  const d=PANEL_CONTENT[state];
  document.getElementById('panelContent').innerHTML=`
    <div class="panel-eyebrow">${d.eye}</div>
    <div class="panel-title">${d.title}</div>
    <div class="panel-sub">${d.sub.replace('\n','<br>')}</div>
    <button class="panel-btn" onclick="switchTo('${d.action}')">${d.btnTxt}</button>
  `;
}
updatePanel('login');

/* ══ SWITCH ══════════════════════════════════════════ */
let currentState='login';
function switchTo(state, silent=false){
  if(state===currentState && !silent)return;
  currentState=state;
  const wrap=document.getElementById('authWrap');
  state==='signup'?wrap.classList.add('is-signup'):wrap.classList.remove('is-signup');
  updatePanel(state);setTheme(state);
  if(!silent){
    const fl=document.getElementById('flash');
    fl.style.background=state==='signup'
      ?'radial-gradient(ellipse 90% 90% at 50% 50%,rgba(244,63,94,0.15) 0%,transparent 70%)'
      :'radial-gradient(ellipse 90% 90% at 50% 50%,rgba(79,70,229,0.12) 0%,transparent 70%)';
    fl.classList.remove('pop');void fl.offsetWidth;fl.classList.add('pop');
    addBurst(innerWidth/2,innerHeight/2,60);
  }
  setTimeout(resizePanel,200);
}

/* ══ CURSOR ══════════════════════════════ */
const cur=document.getElementById('cursor');
const curR=document.getElementById('cursor-ring');
let mx=-100,my=-100,rx=-100,ry=-100;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function cl(){
  cur.style.left=mx+'px';cur.style.top=my+'px';
  rx+=(mx-rx)*0.11;ry+=(my-ry)*0.11;
  curR.style.left=rx+'px';curR.style.top=ry+'px';
  requestAnimationFrame(cl);
})();

/* ══ TRAIL ─ adapts colour by state ════════════════════ */
const TRAIL_N=22;
const trails=Array.from({length:TRAIL_N},()=>{
  const d=document.createElement('div');d.className='trail';document.body.appendChild(d);
  return{el:d,x:0,y:0};
});
(function tl(){
  const col=currentState==='signup'?'rgba(244,63,94,0.55)':'rgba(79,70,229,0.55)';
  let x=mx,y=my;
  trails.forEach((t,i)=>{
    t.x+=(x-t.x)*0.13;t.y+=(y-t.y)*0.13;
    const s=(TRAIL_N-i)/TRAIL_N*0.7;
    t.el.style.cssText=`left:${t.x}px;top:${t.y}px;transform:translate(-50%,-50%) scale(${s});opacity:${s*0.5};width:5px;height:5px;border-radius:50%;background:${col};position:fixed;pointer-events:none;z-index:99990;filter:blur(2px);`;
    x=t.x;y=t.y;
  });
  requestAnimationFrame(tl);
})();

/* ══ INTRO ════════════════════════════════ */
setTimeout(()=>{
  resizePanel();
  const intro=document.getElementById('intro');
  intro.classList.add('exit');
  setTimeout(()=>{
    intro.style.display='none';
    document.getElementById('stage').classList.add('visible');
    addBurst(innerWidth/2,innerHeight/2,60);
  },800);
},3200);

/* ══ TICKER ══════════════════════════════ */
const TICKS=[['UDDAAN','ACTIVE'],['NEURAL AI','ONLINE'],['REALM','OPEN'],['USERS','∞'],['VERSION','2.0'],['UPTIME','99.9%'],['STATUS','LIVE'],['AUTH','SECURE']];
const tk=document.getElementById('ticker');
tk.innerHTML=[...TICKS,...TICKS].map(([k,v])=>
  `<div class="tick-it">${k}&nbsp;<span>${v}</span></div><div class="tick-it" style="color:#ddd5f5;font-size:0.4rem">◆</div>`
).join('');
</script>
