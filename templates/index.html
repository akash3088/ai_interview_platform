<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interview Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080500;
  --bg2:#0f0900;
  --gold:#f5c842;
  --gold2:#ffaa00;
  --gold3:#ffe080;
  --amber:#e07b00;
  --cream:#fff8e7;
  --dim:#5a4a1a;
  --txt:#fff8e7;
  --glow:rgba(245,200,66,0.5);
  --glow2:rgba(255,170,0,0.35);
}
html{font-size:16px}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Rajdhani',sans-serif;
  height:100dvh;overflow:hidden;
  position:relative;cursor:none;
}

/* ══ CURSOR ══════════════════════════════════════════ */
#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--gold);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 14px var(--gold),0 0 30px var(--gold2)}
#cur-ring{position:fixed;width:36px;height:36px;border:1px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:0.45;transition:width 0.3s,height 0.3s,opacity 0.3s}
.trail{position:fixed;border-radius:50%;pointer-events:none;z-index:9990;transform:translate(-50%,-50%)}

/* ══ CANVAS ══════════════════════════════════════════ */
#bgCanvas{position:fixed;inset:0;z-index:0}
#ptCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ══ OVERLAYS ════════════════════════════════════════ */
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}
.grain{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}
.vignette{position:fixed;inset:0;z-index:4;pointer-events:none;background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 25%,rgba(3,2,0,0.94) 100%)}
.grid{position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:linear-gradient(rgba(245,200,66,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(245,200,66,0.035) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 72% 72% at 50% 50%,black,transparent)}
#flash{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0}
#flash.pop{animation:flashBurst 0.7s forwards}
@keyframes flashBurst{0%{opacity:0}12%{opacity:0.3}100%{opacity:0}}

/* ══ STAGE ════════════════════════════════════════════ */
.stage{
  position:relative;z-index:10;height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:0 24px;
}

/* ══ TOP TAG ═════════════════════════════════════════ */
.top-tag{
  font-family:'Share Tech Mono',monospace;
  font-size:0.6rem;letter-spacing:7px;color:var(--dim);text-transform:uppercase;
  display:flex;align-items:center;gap:12px;margin-bottom:30px;
  opacity:0;transform:translateY(-14px);
  animation:fadeDown 0.7s 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
}
.tag-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
@keyframes fadeDown{to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* ══ GREETING ════════════════════════════════════════ */
.greeting{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.6rem,1.4vw,0.82rem);letter-spacing:6px;
  color:var(--gold2);text-transform:uppercase;
  margin-bottom:10px;
  opacity:0;transform:translateY(10px);
  animation:fadeUp 0.6s 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
  text-shadow:0 0 14px rgba(255,170,0,0.5);
}

/* ══ NAME DISPLAY ════════════════════════════════════ */
.name-wrap{
  position:relative;margin-bottom:4px;
  opacity:0;transform:translateY(28px) scale(0.96);
  animation:nameRise 1.0s 1.0s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes nameRise{to{opacity:1;transform:translateY(0) scale(1)}}

.name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(68px, 6.5vw, 160px);
  letter-spacing:4px;
  line-height:1.05;
  white-space:nowrap;
  background:linear-gradient(135deg,#fff8e7 0%,var(--gold3) 25%,var(--gold) 50%,var(--gold2) 75%,var(--amber) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:namePulse 3.5s 2.2s ease-in-out infinite alternate;
}
@keyframes namePulse{
  0%  {filter:drop-shadow(0 0 18px rgba(245,200,66,0.45))}
  100%{filter:drop-shadow(0 0 52px rgba(245,200,66,1.0)) drop-shadow(0 0 100px rgba(255,170,0,0.5))}
}
.bolt{
  font-size:clamp(28px,4.5vw,58px);
  display:inline-block;vertical-align:middle;margin-left:6px;
  -webkit-text-fill-color:var(--gold);
  filter:drop-shadow(0 0 14px rgba(245,200,66,0.9));
  animation:boltFlare 2.5s 2.2s ease-in-out infinite alternate;
}
@keyframes boltFlare{
  0%  {filter:drop-shadow(0 0 10px rgba(245,200,66,0.7))}
  100%{filter:drop-shadow(0 0 28px rgba(255,255,100,1)) drop-shadow(0 0 55px rgba(255,170,0,0.6))}
}

/* ══ RULE ════════════════════════════════════════════ */
.rule{
  width:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--amber),var(--gold3),var(--gold),var(--amber),transparent);
  box-shadow:0 0 14px var(--glow),0 0 32px var(--glow2);
  margin:18px auto 22px;
  animation:ruleGrow 0.9s 1.6s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes ruleGrow{to{width:clamp(180px,36vw,400px)}}

/* ══ TYPING ══════════════════════════════════════════ */
.typing-wrap{
  height:32px;margin-bottom:38px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;animation:fadeDown 0.6s 1.8s forwards;
}
.typing-text{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.75rem,1.8vw,1rem);letter-spacing:3px;
  color:rgba(255,240,180,0.6);
}
.typing-cursor{
  display:inline-block;width:2px;height:1.1em;
  background:var(--gold);margin-left:3px;
  box-shadow:0 0 8px var(--gold);vertical-align:middle;
  animation:cursorBlink 0.9s ease-in-out infinite;
}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

/* ══ STATS ═══════════════════════════════════════════ */
.stats{
  display:flex;gap:clamp(16px,4vw,52px);margin-bottom:44px;
  opacity:0;transform:translateY(12px);
  animation:fadeUp 0.7s 2.1s cubic-bezier(0.22,1,0.36,1) forwards;
}
.stat{text-align:center}
.stat-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.4rem,3vw,2rem);letter-spacing:3px;
  color:var(--gold);text-shadow:0 0 18px var(--glow);display:block;
}
.stat-lbl{
  font-family:'Share Tech Mono',monospace;
  font-size:0.5rem;letter-spacing:3px;color:var(--dim);
  text-transform:uppercase;display:block;margin-top:2px;
}
.stat-sep{width:1px;background:rgba(245,200,66,0.12);align-self:stretch;margin:4px 0}

/* ══ CTA ═════════════════════════════════════════════ */
.cta-wrap{
  opacity:0;transform:translateY(14px);
  animation:fadeUp 0.8s 2.4s cubic-bezier(0.22,1,0.36,1) forwards;
}
.cta-wrap1{
  opacity:0;transform:translateY(14px);
  animation:fadeUp 0.8s 2.9s cubic-bezier(0.22,1,0.36,1) forwards;
}
.cta{
  display:inline-flex;align-items:center;gap:14px;
  text-decoration:none;padding:16px 48px;
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:8px;
  background:linear-gradient(135deg,var(--amber),var(--gold),var(--gold3),var(--gold));
  background-size:300% 100%;
  color:#08050000;
  position:relative;overflow:hidden;cursor:none;
  clip-path:polygon(14px 0%,100% 0%,calc(100% - 14px) 100%,0% 100%);
  transition:all 0.5s cubic-bezier(0.22,1,0.36,1);
  color:#1a0e00;font-weight:900;
}
.cta::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);transition:left 0.6s}
.cta:hover::before{left:140%}
.cta:hover{background-position:100% 0;transform:translateY(-5px);box-shadow:0 20px 60px rgba(245,200,66,0.55),0 0 0 1px rgba(255,255,255,0.12);color:#000}
.cta:active{transform:translateY(-2px)}
.cta-arrow{transition:transform 0.3s;display:inline-block}
.cta:hover .cta-arrow{transform:translateX(7px)}

/* ══ CORNER BRACKETS ═════════════════════════════════ */
.bk{position:fixed;width:26px;height:26px;border-color:rgba(245,200,66,0.22);border-style:solid;z-index:8;pointer-events:none;opacity:0;animation:bkFade 0.5s 0.4s forwards}
@keyframes bkFade{to{opacity:1}}
.bk.tl{top:18px;left:18px;border-width:1.5px 0 0 1.5px}
.bk.tr{top:18px;right:18px;border-width:1.5px 1.5px 0 0}
.bk.bl{bottom:18px;left:18px;border-width:0 0 1.5px 1.5px}
.bk.br{bottom:18px;right:18px;border-width:0 1.5px 1.5px 0}

/* ══ TICKER ══════════════════════════════════════════ */
.ticker-wrap{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(5,3,0,0.92);border-top:1px solid rgba(245,200,66,0.08);padding:8px 0;overflow:hidden}
.ticker-inner{display:flex;gap:54px;white-space:nowrap;animation:tickRoll 38s linear infinite}
@keyframes tickRoll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-i{font-family:'Share Tech Mono',monospace;font-size:0.54rem;letter-spacing:3px;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.tick-i span{color:var(--gold);text-shadow:0 0 10px var(--glow)}

@media(max-width:600px){
  .name{letter-spacing:8px}
  .cta{padding:14px 28px;font-size:1.05rem;letter-spacing:5px}
  .top-tag{letter-spacing:4px;font-size:0.52rem}
  .greeting{letter-spacing:4px}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="ptCanvas"></canvas>
<div class="scan"></div>
<div class="grain"></div>
<div class="grid"></div>
<div class="vignette"></div>
<div id="flash"></div>

<div id="cur"></div>
<div id="cur-ring"></div>

<div class="bk tl"></div><div class="bk tr"></div>
<div class="bk bl"></div><div class="bk br"></div>

<div class="stage">
  <div class="top-tag">
    <div class="tag-dot"></div>
    <span id="tagLine">INTERVIEW PORTAL · SYSTEM LIVE · v3.0</span>
    <div class="tag-dot"></div>
  </div>

  <div class="greeting" id="greeting">WELCOME FUTURE ENGINEER</div>

  <div class="name-wrap">
    <div class="name" id="userName">Ready To Fly For Future<span class="bolt"></span></div>
  </div>

  <div class="rule"></div>

  <div class="typing-wrap">
    <span class="typing-text" id="typingEl"></span>
    <span class="typing-cursor"></span>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="s1">0</span>
      <span class="stat-lbl">Questions</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-num" id="s2">0</span>
      <span class="stat-lbl">Rounds</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-num" id="s3">0</span>
      <span class="stat-lbl">Skills</span>
    </div>
  </div>

  <div class="cta-wrap">
    <a class="cta" href="/dashboard" id="ctaBtn">
      START INTERVIEW <span class="cta-arrow">→</span>
    </a>
  </div>
  <div class="cta-wrap1" style="margin-top: 50px;">
    <a class="cta" href="/about" style="font-size:1rem; padding:12px 30px;">
      ABOUT US →
    </a>
  </div>
</div>

<div class="ticker-wrap"><div class="ticker-inner" id="ticker"></div></div>

<script>
/* ══ CANVAS ═══════════════════════════════════════════ */
const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');
const ptC=document.getElementById('ptCanvas'),ptX=ptC.getContext('2d');
let W,H;
function resize(){W=bgC.width=ptC.width=innerWidth;H=bgC.height=ptC.height=innerHeight}
resize();window.addEventListener('resize',resize);

/* ══ COLOR UTILS ══════════════════════════════════════ */
const rgb=(c,a=1)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;

/* Gold palette orbs */
const ORBS=[
  {xf:0.15,yf:0.25,spd:0.00014,sz:0.65,c:[245,200,66]},
  {xf:0.85,yf:0.70,spd:0.00010,sz:0.58,c:[255,140,0]},
  {xf:0.50,yf:0.50,spd:0.00008,sz:0.50,c:[255,210,80]},
  {xf:0.20,yf:0.80,spd:0.00012,sz:0.38,c:[224,123,0]},
  {xf:0.80,yf:0.20,spd:0.00009,sz:0.42,c:[245,200,66]},
];
function drawBg(ts){
  bgX.clearRect(0,0,W,H);
  bgX.fillStyle='#080500';bgX.fillRect(0,0,W,H);
  ORBS.forEach((o,i)=>{
    const ox=(o.xf+0.32*Math.sin(ts*o.spd+i*1.45))*W;
    const oy=(o.yf+0.26*Math.cos(ts*o.spd*0.75+i*2.1))*H;
    const r=Math.min(W,H)*o.sz;
    const g=bgX.createRadialGradient(ox,oy,0,ox,oy,r);
    g.addColorStop(0,rgb(o.c,0.13));
    g.addColorStop(0.45,rgb(o.c,0.055));
    g.addColorStop(1,rgb(o.c,0));
    bgX.fillStyle=g;
    bgX.beginPath();
    bgX.arc(ox,oy,r,0,Math.PI*2);
    bgX.fill();
  });
  const hg=bgX.createLinearGradient(0,H*0.52,0,H);
  hg.addColorStop(0,rgb([245,200,66],0));
  hg.addColorStop(0.6,rgb([245,200,66],0.04));
  hg.addColorStop(1,rgb([245,200,66],0));
  bgX.fillStyle=hg;
  bgX.fillRect(0,H*0.52,W,H*0.48);
}

/* ══ PARTICLES ════════════════════════════════════════ */
const PCOLS=[[245,200,66],[255,170,0],[255,225,100],[224,123,0]];
const parts=Array.from({length:95},()=>spawnP(true));
const bursts=[];
function spawnP(rand=false){
  return{
    x:Math.random()*innerWidth,
    y:rand?Math.random()*innerHeight:innerHeight+8,
    vx:(Math.random()-0.5)*0.45,
    vy:-(Math.random()*1.3+0.2),
    sz:Math.random()<0.25?2.5:Math.random()<0.6?1.5:1,
    life:Math.random(),
    maxL:Math.random()*0.5+0.45,
    tw:Math.random()*Math.PI*2,
    ci:Math.floor(Math.random()*4)
  };
}
function addBurst(x,y,n=55){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i)/n+Math.random()*0.5,s=Math.random()*9+1.5;
    bursts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,sz:Math.random()*3+1,ci:i%4});
  }
}
function drawParticles(){
  ptX.clearRect(0,0,ptC.width,ptC.height);
  parts.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.life+=0.004;p.tw+=0.048;
    const prog=p.life/p.maxL;
    let op=prog<0.2?prog/0.2:prog>0.75?(1-prog)/0.25:1;
    op*=(0.6+0.4*Math.sin(p.tw));
    if(p.life>=p.maxL||p.y<-20){parts[i]=spawnP(false);return}
    const col=PCOLS[p.ci];
    ptX.beginPath();
    ptX.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ptX.fillStyle=rgb(col,op*0.72);
    ptX.shadowBlur=p.sz*7;
    ptX.shadowColor=rgb(col,0.5);
    ptX.fill();
    ptX.shadowBlur=0;
  });
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    b.x+=b.vx;b.y+=b.vy;b.vy+=0.16;b.life-=0.026;
    if(b.life<=0){bursts.splice(i,1);continue}
    const col=PCOLS[b.ci];
    ptX.beginPath();
    ptX.arc(b.x,b.y,b.sz*b.life,0,Math.PI*2);
    ptX.fillStyle=rgb(col,b.life*0.85);
    ptX.shadowBlur=10;
    ptX.shadowColor=rgb(col,b.life);
    ptX.fill();
    ptX.shadowBlur=0;
  }
}

function loop(ts){drawBg(ts);drawParticles();requestAnimationFrame(loop)}
requestAnimationFrame(loop);

/* ══ CURSOR ═══════════════════════════════════════════ */
const cur=document.getElementById('cur'),curR=document.getElementById('cur-ring');
let mx=-200,my=-200,rx=-200,ry=-200;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function cl(){
  cur.style.left=mx+'px';
  cur.style.top=my+'px';
  rx+=(mx-rx)*0.11;
  ry+=(my-ry)*0.11;
  curR.style.left=rx+'px';
  curR.style.top=ry+'px';
  requestAnimationFrame(cl)
})();

const TRAIL_N=22;
const trails=Array.from({length:TRAIL_N},()=>{
  const d=document.createElement('div');
  d.className='trail';
  document.body.appendChild(d);
  return{el:d,x:0,y:0}
});
(function tl(){
  let x=mx,y=my;
  trails.forEach((t,i)=>{
    t.x+=(x-t.x)*0.12;
    t.y+=(y-t.y)*0.12;
    const s=(TRAIL_N-i)/TRAIL_N*0.65;
    t.el.style.cssText=`left:${t.x}px;top:${t.y}px;width:6px;height:6px;background:rgba(245,200,66,${s*0.65});box-shadow:0 0 ${4+s*5}px rgba(245,200,66,0.5);transform:translate(-50%,-50%) scale(${s});opacity:${s*0.75};border-radius:50%;filter:blur(2px);`;
    x=t.x;y=t.y;
  });
  requestAnimationFrame(tl);
})();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    curR.style.width='54px';
    curR.style.height='54px';
    curR.style.opacity='0.75';
  });
  el.addEventListener('mouseleave',()=>{
    curR.style.width='36px';
    curR.style.height='36px';
    curR.style.opacity='0.45';
  });
});

/* ══ TYPING ═══════════════════════════════════════════ */
const LINES=[
  "Welcome Future Engineer",
  "Smart. Fast. Futuristic.",
  "Prepare for your interview journey",
  "Build your future with confidence",
];

let li=0,ci=0,deleting=false;
const typEl=document.getElementById('typingEl');
function type(){
  const line=LINES[li];
  typEl.textContent=deleting?line.slice(0,ci--):line.slice(0,ci++);
  if(!deleting&&ci>line.length){deleting=true;setTimeout(type,1300);return}
  if(deleting&&ci<0){deleting=false;li=(li+1)%LINES.length;ci=0}
  setTimeout(type,deleting?38:82);
}
setTimeout(type,2200);

/* ══ COUNTERS ═════════════════════════════════════════ */
function countUp(el,target,suffix='',delay=0){
  setTimeout(()=>{
    let c=0;
    const step=target/55;
    const iv=setInterval(()=>{
      c+=step;
      if(c>=target){c=target;clearInterval(iv)}
      el.textContent=Math.floor(c)+suffix;
    },28);
  },delay);
}
setTimeout(()=>{
  countUp(document.getElementById('s1'),50,'+',0);
  countUp(document.getElementById('s2'),5,'',180);
  countUp(document.getElementById('s3'),12,'+',360);
},2600);

/* ══ BURST on CTA ═════════════════════════════════════ */
document.querySelector('.cta').addEventListener('click',e=>{
  addBurst(e.clientX,e.clientY,65);
  const fl=document.getElementById('flash');
  fl.style.background='radial-gradient(ellipse 80% 80% at 50% 50%,rgba(245,200,66,0.25) 0%,transparent 70%)';
  fl.classList.remove('pop');
  void fl.offsetWidth;
  fl.classList.add('pop');
});
